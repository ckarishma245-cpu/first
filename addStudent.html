<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
        }

        input{
            padding: 8px;
            width: 200px;
            margin: 5px;
        }

        button{
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        table{
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td{
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>

<body>

<h1>Student Management System</h1>

<form onsubmit="addStudent(); return false;">

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="roll" placeholder="Roll Number"><br>
<input type="text" id="course" placeholder="Course"><br>

<button>Add Student</button>

</form>

<h2>Student List</h2>

<button type="button" onclick="clearData()">Clear All</button>

<br><br>

<table>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Course</th>
<th>Action</th>
</tr>

<tbody id="studentTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
